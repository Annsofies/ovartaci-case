<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hvor godt kender du Ovartaci?</title>
    <link rel="stylesheet" href="css/style.css" />

    <script src="js/script.js" defer></script>
    <script src="js/alias.js" defer></script>
  </head>
  <body>
    <main id="app" class="app">
      <section
        id="startScreen"
        class="screen hero-screen active"
        aria-labelledby="heroTitle"
      >
        <!-- Baggrundsvideo -->
        <video class="background-video" autoplay muted loop playsinline>
          <source src="video/ovi-video.mp4" type="video/mp4" />
        </video>

        <div class="hero-overlay">
          <div class="hero-card">
            <h1 id="heroTitle">Hvor godt kender du Ovartaci?</h1>
            <p>
              Test din viden gennem en interaktiv quiz med feedback, point og
              leaderboard.
            </p>
            <button class="primary-btn" id="startBtn">Start quiz</button>
          </div>
        </div>
      </section>
      <section
        id="aliasScreen"
        class="screen alias-screen"
        aria-labelledby="aliasTitle"
      >
        <div class="content-card">
          <h2 id="aliasTitle">Indtast dit alias</h2>

          <input
            id="nameInput"
            type="text"
            maxlength="18"
            placeholder="Skriv dit alias"
            readonly
          />
          <p id="nameError" class="error" aria-live="polite"></p>

          <!-- KEYBOARD -->
          <div class="keyboard">
            <div class="keyboard-row">
              <button type="button" class="key">Q</button>
              <button type="button" class="key">W</button>
              <button type="button" class="key">E</button>
              <button type="button" class="key">R</button>
              <button type="button" class="key">T</button>
              <button type="button" class="key">Y</button>
              <button type="button" class="key">U</button>
              <button type="button" class="key">I</button>
              <button type="button" class="key">O</button>
              <button type="button" class="key">P</button>
            </div>

            <div class="keyboard-row">
              <button type="button" class="key">A</button>
              <button type="button" class="key">S</button>
              <button type="button" class="key">D</button>
              <button type="button" class="key">F</button>
              <button type="button" class="key">G</button>
              <button type="button" class="key">H</button>
              <button type="button" class="key">J</button>
              <button type="button" class="key">K</button>
              <button type="button" class="key">L</button>
            </div>

            <div class="keyboard-row">
              <button type="button" id="shift">Shift</button>

              <button type="button" class="key">Z</button>
              <button type="button" class="key">X</button>
              <button type="button" class="key">C</button>
              <button type="button" class="key">V</button>
              <button type="button" class="key">B</button>
              <button type="button" class="key">N</button>
              <button type="button" class="key">M</button>

              <button type="button" id="backspace">⌫</button>
            </div>

            <div class="keyboard-row">
              <button type="button" id="leftArrow">←</button>
              <button type="button" id="space">Mellemrum</button>
              <button type="button" id="rightArrow">→</button>
            </div>
          </div>

          <button class="primary-btn" id="saveNameBtn">Start quiz</button>
        </div>
      </section>

      <section
        id="quizScreen"
        class="screen quiz-screen"
        aria-labelledby="questionTitle"
      >
        <header class="topbar">
          <div class="progress-wrap" aria-label="Quiz fremgang">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <p id="questionCounter">Spørgsmål 1/10</p>
        </header>

        <div class="quiz-layout">
          <figure class="image-panel">
            <img
              id="questionImage"
              src=""
              alt="Billede relateret til spørgsmålet"
            />
          </figure>
          <article class="question-panel">
            <h2 id="questionText"></h2>
            <p id="questionTitle">Vælg det rigtige udsagn</p>
            <div id="answers" class="answers"></div>
          </article>
        </div>
      </section>

      <section
        id="feedbackScreen"
        class="screen feedback-screen"
        aria-labelledby="feedbackTitle"
      >
        <header class="topbar">
          <div class="progress-wrap">
            <div id="feedbackProgressBar" class="progress-bar"></div>
          </div>
          <p id="feedbackCounter"></p>
        </header>
        <div class="feedback-layout">
          <div>
            <h2 id="feedbackTitle"></h2>
            <p id="feedbackText"></p>
            <p id="correctAnswerText" class="correct-answer"></p>
          </div>
          <figure class="feedback-image-wrap">
            <img id="feedbackImage" src="" alt="Feedback billede" />
          </figure>
        </div>
        <button
          class="next-btn"
          id="nextBtn"
          aria-label="Gå til næste spørgsmål"
        >
          ➜
        </button>
      </section>

      <section
        id="scoreScreen"
        class="screen score-screen"
        aria-labelledby="scoreTitle"
      >
        <div class="score-card">
          <h2 id="scoreTitle">Scoreboard</h2>
          <p id="finalScore"></p>
          <ol id="scoreList" class="score-list"></ol>
          <button class="primary-btn" id="restartBtn">Prøv igen</button>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
