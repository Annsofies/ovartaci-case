<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hvor godt kender du Ovataci?</title>
    <link rel="stylesheet" href="css/style.css" />

</head>
<body>

    <!-- Startside med overskrift og startknap -->
    <main id="quiz" class="quiz">
        <section id="startScreen" class="hero-screen active">
            <div class="hero-card">
                <h1>Hvor godt kender du Ovataci?</h1>
                <p>Test din viden om Ovataci og se, hvor meget du virkelig ved! Se din samlede score efter og dyst mod andre.</p>
                <button id="start-btn" class="startBtn">Start Quiz</button>
            </div>
        </section>

    <!-- Side hvor bruger skriver alias -->
    <section id="aliasSide" class="alias-side">
        <div class="alias-card">
            <h2 id="nameTitle">Indtast dit navn</h2>
            <p>Dette navn vil blive brugt til at se din placering på scoreboardet.</p>
            <input id="nameInput" type="text" maxlength="20" placeholder="Skriv dit navn her" autocomplete="off"/>
            <p id="nameError" class="error"></p>
            <button class="start-btn" id="saveNameBtn">Start Quiz</button>
        </div>
    </section>



    <script src="js/script.js"></script>
</body>
</html>
