<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hvor godt kender du Ovataci?</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navnside.css" />
  </head>
  <body>
    <!-- Startside med overskrift og startknap -->
    <main id="quiz" class="quiz">
      <section id="startScreen" class="hero-screen active">
        <div class="hero-card">
          <h1>Hvor godt kender du Ovataci?</h1>
          <p>
            Test din viden om Ovataci og se, hvor meget du virkelig ved! Se din
            samlede score efter og dyst mod andre.
          </p>
          <button id="start-btn" class="startBtn">Start Quiz</button>
        </div>
      </section>

      <!-- Side hvor bruger skriver alias -->
      <section id="aliasScreen" class="alias-screen">
        

         <!-- Hoved-container til hele navnsiden siden -->
         <div class="container">
         <h1>SKRIV DIT NAVN</h1>
            <p class="subtitle">Dit navn bruges til at vise dine resultater på scoreboardet til sidst i spillet.</p>
        
            <!-- Inputfelt hvor brugeren skriver navn -->
            <div id="inputBox">
                <input type="text" id="nameInput" placeholder="navn" readonly />
            </div>

            <!-- Skriver en fejlbesked hvis brugeren ikke skriver noget i inputfeltet -->
            <p id="nameError"></p>

            <!-- START KNAP - Linker videre til quiz-side -->
            <button id="startButton">START QUIZ</button>

            <!-- Tastatur -->
            <div class="keyboard-area"></div>
            <div class="keyboard">

            <!-- Tastatur - HVID BAGGRUND BAG KEYBOARD -->
            <div class="keyboard">

            <!-- Række 1 -->
            <div class="row">
            <button class="key">Q</button>
            <button class="key">W</button>
            <button class="key">E</button>
            <button class="key">R</button>
            <button class="key">T</button>
            <button class="key">Y</button>
            <button class="key">U</button>
            <button class="key">I</button>
            <button class="key">O</button>
            <button class="key">P</button>
            <button class="key">Å</button>
            </div>

            <!-- Række 2 -->
            <div class="row">
            <button class="key">A</button>
            <button class="key">S</button>
            <button class="key">D</button>
            <button class="key">F</button>
            <button class="key">G</button>
            <button class="key">H</button>
            <button class="key">J</button>
            <button class="key">K</button>
            <button class="key">L</button>
            <button class="key">Æ</button>
            <button class="key">Ø</button>
            </div>

            <!-- Række 3 -->
            <div class="row">
            <button id="shift">SHIFT</button> <!-- Shift-knap -->

            <button class="key">Z</button>
            <button class="key">X</button>
            <button class="key">C</button>
            <button class="key">V</button>
            <button class="key">B</button>
            <button class="key">N</button>
            <button class="key">M</button>

            <button class="key">-</button>
            <button class="key">.</button>

            <button id="backspace">⌫</button>
            </div>

            <!-- Række 4 - Navigation + space -->
            <div class="row">
            <button id="leftArrow">◀</button>

            <button id="space">SPACE</button>

            <button id="rightArrow">▶</button>
            </div>
        </div>
        </div>

      </section>      

      <!-- Spørgsmålsider -->
      <section id="questionScreen" class="question-screen">
        <header class="topbar">
          <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <p id="questionCounter">Spørgsmål 1 af 10</p>
        </header>

        <div class="quiz-layout">
          <figure class="image-container">
            <img
              id="questionImage"
              src=""
              alt="Billede releteret til spørgsmål"
            />
          </figure>
          <article class="question-container">
            <h2 id="questionTitle">Spørgsmål</h2>
            <p id="questionText"></p>
            <div id="answers" class="answers"></div>
          </article>
        </div>
      </section>

      <!-- Feedbacksider -->
      <section id="feedbackScreen" class="feedback-screen">
        <header class="topbar">
          <div class="progress-container">
            <div id="feedbackProgressBar" class="progress-bar"></div>
          </div>
          <p id="feedbackCounter"></p>
        </header>
        <div class="feedback-card">
          <div>
            <h2 id="feedbackTitle"></h2>
            <p id="feedbackText"></p>
            <p id="correctAnswerText" class="correct-answer"></p>
          </div>
          <figure class="feedback-image-wrap">
            <img id="feedbackImage" src="" alt="Feedback billede" />
          </figure>
        </div>
        <button class="next-btn" id="nextBtn">Næste spørgsmål</button>
      </section>

      <!-- Scoreboard skærm -->
      <section id="scoreScreen" class="score-screen">
        <div class="score-card">
          <h2 id="scoreTitle">Scoreboard</h2>
          <p id="finalScore"></p>
          <ol id="scoreList" class="score-list"></ol>
          <button class="restart-btn" id="restartBtn">Start quiz igen</button>
        </div>
      </section>
    </main>
    <script src="js/script.js"></script>
    <script src="js/navnside.js"></script>
  </body>
</html>
